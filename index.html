<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cinescope</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              display: ['"Bebas Neue"', 'cursive'],
              body: ['"DM Sans"', 'sans-serif'],
            },
            colors: {
              bg: '#09090f',
              surface: '#111118',
              card: '#18181f',
              border: '#272736',
              accent: '#e8c547',
              danger: '#c4395e',
              muted: '#64647a',
              light: '#eeecea',
            },
          },
        },
      };
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  </head>
  <body>
    <header class="sticky top-0 z-50 bg-bg/90 backdrop-blur-md border-b border-border px-5 md:px-12 py-3 flex items-center gap-4">
      <a href="/" class="font-display text-3xl tracking-widest leading-none shrink-0">Cine<span class="text-accent">scope</span></a>
      <div class="relative flex-1 max-w-xl">
        <input id="searchInput" class="w-full bg-card border border-border text-light text-sm px-4 py-2.5 pr-10 outline-none focus:border-accent" placeholder="Search movies and shows" />
        <button id="clearBtn" onclick="clearSearch()" class="hidden absolute right-2 top-1/2 -translate-y-1/2 text-muted hover:text-accent px-2" aria-label="Clear search">&times;</button>
      </div>
      <div id="authSlot" class="flex items-center gap-2 shrink-0"></div>
    </header>

    <main>
      <section id="bannerWrap" class="relative h-[58vh] min-h-[420px] max-h-[640px] overflow-hidden border-b border-border">
        <div id="banner" class="absolute inset-0">
          <div class="banner-shimmer absolute inset-0 bg-card"></div>
        </div>
        <div id="bannerControls" class="absolute inset-x-5 md:inset-x-12 bottom-6 z-10 flex items-center justify-between gap-4">
          <div id="bannerDots" class="flex items-center gap-2"></div>
          <div class="flex gap-2">
            <button onclick="bannerPrev()" class="nav-btn" aria-label="Previous banner">&#8592;</button>
            <button onclick="bannerNext()" class="nav-btn" aria-label="Next banner">&#8594;</button>
          </div>
        </div>
      </section>

      <section id="continueSection" class="hidden px-5 md:px-12 py-8 border-b border-border">
        <div class="flex items-baseline gap-3 mb-4">
          <h2 class="font-display text-3xl tracking-widest">Continue Watching</h2>
          <span class="text-muted text-xs tracking-widest uppercase">Synced when logged in</span>
        </div>
        <div id="continueScroll" class="flex gap-2 overflow-x-auto pb-2"></div>
      </section>

      <section class="px-5 md:px-12 py-7 border-b border-border flex flex-col gap-5">
        <div class="flex flex-wrap items-end justify-between gap-4">
          <div>
            <h1 id="sectionTitle" class="font-display text-4xl tracking-widest leading-none">Discover</h1>
            <p id="sectionSub" class="text-muted text-sm tracking-wide mt-1">Top rated & popular</p>
          </div>
          <div class="flex flex-wrap items-center gap-2">
            <div id="sortWrap" class="hidden">
              <select id="sortSelect" onchange="onSortChange()" class="bg-card border border-border text-light text-xs uppercase tracking-widest px-3 py-2">
                <option value="smart">Smart sort</option>
                <option value="relevance">Relevance</option>
                <option value="rating">Rating</option>
                <option value="popularity">Popularity</option>
                <option value="year_desc">Newest</option>
                <option value="year_asc">Oldest</option>
              </select>
            </div>
            <div id="yearPickerWrap" class="relative">
              <button onclick="toggleYearPicker()" class="nav-btn"><span id="yearLabel">All Years</span> <span id="yearChevron" class="inline-block transition-transform">&#8964;</span></button>
              <div id="yearDropdown" class="hidden absolute right-0 mt-2 w-72 bg-surface border border-border z-30 p-4 shadow-2xl">
                <div class="flex items-center justify-between mb-3">
                  <button onclick="shiftDecade(-1)" class="nav-btn">&#8592;</button>
                  <span id="decadeLabel" class="text-xs text-muted tracking-widest uppercase"></span>
                  <button onclick="shiftDecade(1)" class="nav-btn">&#8594;</button>
                </div>
                <button onclick="selectYear(null)" class="w-full border border-border text-muted hover:text-accent hover:border-accent py-2 text-sm mb-2">All Years</button>
                <div id="yearGrid" class="grid grid-cols-2 gap-1"></div>
              </div>
            </div>
            <button onclick="toggleFilterBar()" class="nav-btn">Filters <span id="filterCount" class="hidden text-accent"></span></button>
          </div>
        </div>
        <div id="filterBar" class="filter-bar">
          <div>
            <div class="flex flex-wrap gap-2 pt-1">
              <button id="typeAll" onclick="setTypeFilter('all')" class="nav-btn type-filter active">All</button>
              <button id="typeMovie" onclick="setTypeFilter('movie')" class="nav-btn type-filter">Movies</button>
              <button id="typeTv" onclick="setTypeFilter('tv')" class="nav-btn type-filter">TV</button>
              <select id="genreSelect" onchange="setGenreFilter(this.value)" class="bg-card border border-border text-light text-xs uppercase tracking-widest px-3 py-2"><option value="">Any Genre</option></select>
              <select id="ratingSelect" onchange="setRatingFilter(this.value)" class="bg-card border border-border text-light text-xs uppercase tracking-widest px-3 py-2">
                <option value="">Any Rating</option><option value="7">7+</option><option value="8">8+</option><option value="9">9+</option>
              </select>
              <select id="votesSelect" onchange="setVotesFilter(this.value)" class="bg-card border border-border text-light text-xs uppercase tracking-widest px-3 py-2">
                <option value="">Any Votes</option><option value="500">500+</option><option value="1000">1,000+</option><option value="5000">5,000+</option>
              </select>
              <button onclick="clearAllFilters()" class="nav-btn">Clear</button>
            </div>
          </div>
        </div>
      </section>

      <p id="status" class="px-5 md:px-12 pb-3 text-xs tracking-widest uppercase min-h-5 text-muted"></p>
      <section id="grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-2 px-5 md:px-12 pb-12"></section>
      <div id="spinner" class="hidden text-center text-muted text-xs tracking-widest uppercase pb-8">Loading...</div>
      <div id="sentinel" class="h-8"></div>
    </main>

    <div id="modalBackdrop" class="modal-backdrop" onclick="backdropClose(event)">
      <div class="max-w-4xl mx-auto bg-surface border border-border grid md:grid-cols-[280px_1fr] relative">
        <button onclick="closeModal()" class="absolute right-3 top-3 z-10 nav-btn" aria-label="Close">&times;</button>
        <div id="modalPoster" class="relative bg-card min-h-80"></div>
        <div id="modalBody" class="p-6 md:p-8 flex flex-col gap-4"></div>
      </div>
    </div>

    <div id="authModal" class="hidden fixed inset-0 z-[90] bg-black/80 backdrop-blur-sm p-5 flex items-center justify-center">
      <form id="authForm" class="w-full max-w-sm bg-surface border border-border p-5 flex flex-col gap-3">
        <div class="flex items-center justify-between gap-4">
          <h2 id="authTitle" class="font-display text-3xl tracking-widest">Login</h2>
          <button type="button" data-close-auth class="nav-btn" aria-label="Close">&times;</button>
        </div>
        <input id="nameField" name="displayName" class="hidden bg-bg border border-border text-light px-3 py-2 outline-none focus:border-accent" placeholder="Display name" />
        <input name="email" type="email" required class="bg-bg border border-border text-light px-3 py-2 outline-none focus:border-accent" placeholder="Email" />
        <input name="password" type="password" required minlength="6" class="bg-bg border border-border text-light px-3 py-2 outline-none focus:border-accent" placeholder="Password" />
        <p id="authError" class="min-h-5 text-danger text-xs"></p>
        <button id="authSubmit" class="nav-btn nav-btn-primary" type="submit">Login</button>
        <button id="authModeToggle" class="text-muted hover:text-accent text-xs uppercase tracking-widest" type="button">Create new account</button>
      </form>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
